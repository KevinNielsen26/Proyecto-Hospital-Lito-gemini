<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Camas - Hospital Lito</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/lista.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Header -->
<div th:replace="~{fragmentos/header :: navbar}"></div>

<!-- Contenido -->
<div class="flex-grow-1 content-wrapper">
    <div class="container mt-4">

        <!-- Mensajes -->
        <div th:replace="~{fragmentos/messages :: alert_messages}"></div>

        <!-- Encabezado -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="page-title">
                <i class="bi bi-bed-fill"></i> Gestión de Camas
            </h2>
            <a href="/camas/nueva" class="btn btn-primary btn-lg">
                <i class="bi bi-plus-circle"></i> Nueva Cama
            </a>
        </div>

        <!-- Estadísticas -->
        <div class="row mb-4 g-3">
            <div class="col-md-4">
                <div class="card text-white stat-card">
                    <div class="card-body text-center l">
                        <h3 th:text="${#lists.size(camas.?[estado == 'libre'])}">0</h3>
                        <p class="mb-0">
                            <i class="bi bi-check-circle-fill"></i> Camas Libres
                        </p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white stat-card">
                    <div class="card-body text-center">
                        <h3 th:text="${#lists.size(camas.?[estado == 'ocupada'])}">0</h3>
                        <p class="mb-0">
                            <i class="bi bi-x-circle-fill"></i> Camas Ocupadas
                        </p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white stat-card">
                    <div class="card-body text-center">
                        <h3 th:text="${#lists.size(camas)}">0</h3>
                        <p class="mb-0">
                            <i class="bi bi-hospital-fill"></i> Total Camas
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabla de camas -->
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Ubicación</th>
                            <th>Categoría</th>
                            <th class="text-center">Estado</th>
                            <th class="text-center">ID Historia Clínica</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="cama : ${camas}">
                            <td th:text="${cama.idCama}" class="fw-bold">#</td>
                            <td>
                                <i class="bi bi-geo-alt-fill text-primary"></i>
                                <span th:text="${cama.ubicacion}"></span>
                            </td>
                            <td>
                                <span class="badge bg-info" th:text="${cama.categoria.descripcion}"></span>
                                <br>
                                <small class="text-muted">
                                    Max: <span th:text="${cama.categoria.max_cant_enfermeras}"></span> enfermeras
                                </small>
                            </td>
                            <td class="text-center">
                                        <span th:if="${cama.estado == 'libre'}"
                                              class="badge bg-success fs-6">
                                            <i class="bi bi-check-circle-fill"></i> Libre
                                        </span>
                                <span th:if="${cama.estado == 'ocupada'}"
                                      class="badge bg-danger fs-6">
                                            <i class="bi bi-person-fill"></i> Ocupada
                                        </span>
                            </td>
                            <td class="text-center">
                                        <span th:if="${cama.idhc != null}"
                                              class="badge bg-dark"
                                              th:text="${cama.idhc}"></span>
                                <span th:if="${cama.idhc == null}"
                                      class="text-muted">-</span>
                            </td>
                            <td>
                                <div class="btn-group d-flex justify-content-center" role="group">
                                    <!-- Asignar Paciente -->
                                    <a th:if="${cama.estado == 'libre'}"
                                       th:href="@{/camas/{id}/asignar-paciente(id=${cama.idCama})}"
                                       class="btn btn-sm btn-outline-primary"
                                       title="Asignar Paciente">
                                        <i class="bi bi-person-plus-fill"></i> Asignar
                                    </a>

                                    <!-- Liberar Cama -->
                                    <form th:if="${cama.estado == 'ocupada'}"
                                          th:action="@{/camas/{id}/liberar(id=${cama.idCama})}"
                                          method="post"
                                          style="display: inline;">
                                        <button type="submit"
                                                class="btn btn-sm btn-outline-warning"
                                                title="Liberar Cama"
                                                onclick="return confirm('¿Está seguro de liberar esta cama?')">
                                            <i class="bi bi-unlock-fill"></i> Liberar
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Mensaje si no hay camas -->
                <div th:if="${#lists.isEmpty(camas)}" class="text-center py-5">
                    <i class="bi bi-inbox display-1 text-muted"></i>
                    <p class="text-muted mt-3">No hay camas registradas en el sistema</p>
                    <a href="/camas/nueva" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> Agregar Primera Cama
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<div th:replace="~{fragmentos/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
